<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Command Center</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Mitr', sans-serif; }
        body { background-color: #0f172a; color: #e2e8f0; padding: 20px; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 20px 20px; }
        
        header { text-align: center; margin-bottom: 40px; border-bottom: 2px dashed #334155; padding-bottom: 20px; }
        h1 { color: #facc15; font-size: 36px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px rgba(250, 204, 21, 0.4); }
        .subtitle { color: #94a3b8; font-size: 18px; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        
        .team-card { background: rgba(30, 41, 59, 0.9); border: 2px solid #334155; border-radius: 12px; padding: 20px; position: relative; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .team-card.active { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        .team-card.completed { border-color: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); background: rgba(16, 185, 129, 0.05); }
        
        .team-name { font-size: 24px; font-weight: bold; color: #fff; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { font-size: 12px; padding: 4px 8px; border-radius: 6px; background: #334155; color: #cbd5e1; font-weight: 600; letter-spacing: 1px; }
        .active .status-badge { background: #0284c7; color: #fff; }
        .completed .status-badge { background: #059669; color: #fff; }

        .phase-info { font-size: 18px; color: #94a3b8; margin-bottom: 15px; min-height: 28px; font-weight: 500; }
        .active .phase-info { color: #38bdf8; }
        .completed .phase-info { color: #10b981; font-weight: 600; }

        .progress-bar-bg { width: 100%; height: 14px; background: #0f172a; border-radius: 8px; overflow: hidden; border: 1px solid #334155; }
        .progress-fill { height: 100%; background: #475569; width: 0%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .active .progress-fill { background: #38bdf8; box-shadow: 0 0 10px #38bdf8; }
        .completed .progress-fill { background: #10b981; box-shadow: 0 0 10px #10b981; width: 100% !important; }

        .last-update { font-size: 13px; color: #64748b; margin-top: 15px; text-align: right; }
        
        @media (max-width: 768px) {
            h1 { font-size: 28px; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>INSTRUCTOR COMMAND CENTER</h1>
        <p class="subtitle">ระบบติดตามสถานะนักเรียนแบบ Real-Time</p>
    </header>

    <div class="dashboard-grid" id="dashboard">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // คอนฟิกตัวเดียวกับของนักเรียนเป๊ะเลยค่ะ
        const firebaseConfig = {
            apiKey: "AIzaSyAZZpLmQqWzba6xANwtvLYnlxUF2xVFnlw",
            authDomain: "test8-26ca2.firebaseapp.com",
            databaseURL: "https://test8-26ca2-default-rtdb.firebaseio.com",
            projectId: "test8-26ca2",
            storageBucket: "test8-26ca2.firebasestorage.app",
            messagingSenderId: "330679832875",
            appId: "1:330679832875:web:0f32e9829a355d59ff756e",
            measurementId: "G-XF15F16DRK"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const totalPhases = 6;
        const phaseNames = [
            "OFFLINE",
            "ด่าน 1: นับอิฐปวดหัว",
            "ด่าน 2: พยากรณ์ชั้นที่ 25",
            "ด่าน 3: กำแพงนี้สูงเท่าไหร่?",
            "ด่าน 4: เรื่องเงินๆ ทองๆ",
            "ด่าน 5: ใครจะแซงใคร?",
            "ด่าน 6: โลกแห่งความจริง",
            "🎉 ภารกิจเสร็จสมบูรณ์!"
        ];

        const dashboard = document.getElementById('dashboard');
        for (let i = 1; i <= 6; i++) {
            const teamId = 'team' + i;
            dashboard.innerHTML += `
                <div class="team-card" id="card-${teamId}">
                    <div class="team-name">
                        กลุ่มที่ ${i}
                        <span class="status-badge" id="badge-${teamId}">STANDBY</span>
                    </div>
                    <div class="phase-info" id="phase-${teamId}">รอการเชื่อมต่อ...</div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill" id="progress-${teamId}"></div>
                    </div>
                    <div class="last-update" id="time-${teamId}">--:--:--</div>
                </div>
            `;
        }

        const gameStateRef = ref(db, 'game_state');
        onValue(gameStateRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                for (let i = 1; i <= 6; i++) {
                    const teamId = 'team' + i;
                    if (data[teamId]) {
                        updateTeamUI(teamId, data[teamId].stage, data[teamId].timestamp);
                    }
                }
            }
        });

        function updateTeamUI(teamId, stage, timestamp) {
            const card = document.getElementById(`card-${teamId}`);
            const badge = document.getElementById(`badge-${teamId}`);
            const phaseInfo = document.getElementById(`phase-${teamId}`);
            const progress = document.getElementById(`progress-${teamId}`);
            const timeInfo = document.getElementById(`time-${teamId}`);

            const date = new Date(timestamp);
            timeInfo.innerText = "อัปเดตล่าสุด: " + date.toLocaleTimeString('th-TH');

            if (stage > totalPhases) {
                card.className = "team-card completed";
                badge.innerText = "ผ่านฉลุย";
                phaseInfo.innerText = phaseNames[7];
                progress.style.width = "100%";
            } else if (stage > 0) {
                card.className = "team-card active";
                badge.innerText = "กำลังลุย";
                phaseInfo.innerText = phaseNames[stage];
                const pct = ((stage - 1) / totalPhases) * 100;
                progress.style.width = `${pct}%`;
            }
        }
    </script>
</body>
</html>
